version: '3.8'

services:
  db:
    build: 
      context: ./database
    container_name: postgres_db
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
    networks:
      ipvlan_net:
        ipv4_address: 172.22.95.10 # Static IP on your LAN
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: node_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: admin
      DB_PASSWORD: securepassword123
      DB_HOST: 172.22.95.10
      DB_NAME: mydatabase
      DB_PORT: 5432
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      ipvlan_net:
        ipv4_address: 172.22.95.11 # Static IP on your LAN
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    name: pg_persistent_data

networks:
  ipvlan_net:
    external: true